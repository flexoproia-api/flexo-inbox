<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flexo PRO IA — Atendimento</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0d0f14;--bg2:#13161e;--bg3:#1a1e28;--border:#252938;--border2:#2e3347;
  --text:#e8eaf0;--text2:#8b90a6;--text3:#555c78;--accent:#4f7cff;--accent2:#7b9fff;
  --green:#22c55e;--green2:#16a34a;--amber:#f59e0b;--red:#ef4444;--sent-bg:#1b2a6e;
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--bg);color:var(--text);display:flex;height:100vh}

/* ── SIDEBAR ── */
#sidebar{width:300px;min-width:300px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh}
#sidebar-header{padding:18px 16px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.brand{display:flex;align-items:center;gap:10px}
.brand-logo{width:34px;height:34px;background:var(--accent);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff}
.brand-name{font-size:13px;font-weight:600}
.brand-sub{font-size:11px;color:var(--text3);margin-top:1px}
#atendente-bar{padding:8px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;font-size:12px;flex-shrink:0}
#atendente-badge{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0}
#atendente-nome{color:var(--text2);font-family:var(--mono);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#trocar-btn{background:none;border:none;color:var(--text3);font-size:11px;cursor:pointer;font-family:var(--font);flex-shrink:0}
#trocar-btn:hover{color:var(--accent2)}
#refresh-btn{background:none;border:1px solid var(--border2);border-radius:8px;color:var(--text2);cursor:pointer;padding:5px 9px;font-size:12px;display:flex;align-items:center;gap:4px;font-family:var(--font);transition:all .15s}
#refresh-btn:hover{background:var(--bg3);color:var(--text)}
#refresh-btn.spinning svg{animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#conv-list{flex:1;overflow-y:auto;padding:6px}
#conv-list::-webkit-scrollbar{width:3px}
#conv-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.conv-item{padding:11px 13px;border-radius:10px;cursor:pointer;transition:background .1s;margin-bottom:2px;border:1px solid transparent;position:relative}
.conv-item:hover{background:var(--bg3)}
.conv-item.active{background:var(--bg3);border-color:var(--border2)}
.conv-item.locked{opacity:.55;cursor:not-allowed}
.conv-item.has-unread{border-left:3px solid var(--accent)}
.conv-row1{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px}
.conv-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:150px}
.conv-name.unread{color:#fff;font-weight:700}
.conv-time{font-size:11px;color:var(--text3);font-family:var(--mono);flex-shrink:0}
.conv-preview{font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px}
.conv-preview.unread{color:var(--text);font-weight:500}
.conv-atend{font-size:10px;color:var(--text3);margin-bottom:4px}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:500;padding:2px 7px;border-radius:20px;font-family:var(--mono)}
.b-wait{background:rgba(245,158,11,.12);color:var(--amber)}
.b-active{background:rgba(79,124,255,.12);color:var(--accent2)}
.dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.dot-pulse{animation:pulse 1.4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.dot-wait{background:var(--amber)}
.dot-active{background:var(--accent)}
.empty-msg{display:flex;flex-direction:column;align-items:center;justify-content:center;height:160px;gap:8px;color:var(--text3);font-size:13px}
.notif-badge{background:var(--red);color:#fff;font-size:10px;font-weight:700;font-family:var(--mono);padding:2px 7px;border-radius:10px;min-width:20px;text-align:center;animation:pulse 1.4s ease-in-out infinite}

/* ── MAIN ── */
#main{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden}
#placeholder{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--text3)}
#placeholder p{font-size:14px}
#chat-view{display:none;flex-direction:column;height:100vh;overflow:hidden}
#chat-header{padding:14px 22px;border-bottom:1px solid var(--border);background:var(--bg2);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.client-info{display:flex;align-items:center;gap:12px}
.avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#7c3aed);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;color:#fff;flex-shrink:0}
.client-name{font-size:14px;font-weight:500}
.client-phone{font-size:12px;color:var(--text2);font-family:var(--mono);margin-top:1px}
.client-empresa{font-size:11px;color:var(--accent2);margin-top:2px}
.client-atend{font-size:11px;color:var(--text3);margin-top:1px}
.header-actions{display:flex;align-items:center;gap:8px}
.btn-contato{background:none;border:1px solid var(--border2);border-radius:8px;color:var(--text2);cursor:pointer;padding:6px 12px;font-size:12px;font-family:var(--font);display:flex;align-items:center;gap:5px;transition:all .15s}
.btn-contato:hover{background:var(--bg3);color:var(--text)}
.btn-finish{background:var(--green2);color:#fff;border:none;border-radius:8px;padding:7px 15px;font-size:13px;font-weight:500;cursor:pointer;font-family:var(--font);display:flex;align-items:center;gap:6px;transition:background .15s}
.btn-finish:hover{background:#15803d}
.btn-finish:disabled{opacity:.5;cursor:not-allowed}
#summary-bar{margin:10px 22px 0;padding:10px 14px;background:var(--bg2);border:1px solid var(--border2);border-left:3px solid var(--accent);border-radius:0 10px 10px 0;font-size:12px;color:var(--text2);line-height:1.6;flex-shrink:0;max-height:72px;overflow-y:auto}
#summary-bar strong{color:var(--accent2);font-weight:500}

/* Separador de sessão anterior */
.session-divider{display:flex;align-items:center;gap:10px;padding:10px 0;flex-shrink:0}
.session-divider span{font-size:11px;color:var(--text3);white-space:nowrap;font-family:var(--mono)}
.session-divider::before,.session-divider::after{content:'';flex:1;height:1px;background:var(--border)}

#messages{flex:1;overflow-y:auto;padding:14px 22px 14px;display:flex;flex-direction:column;gap:6px}
#messages::-webkit-scrollbar{width:3px}
#messages::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.msg{display:flex;flex-direction:column;max-width:72%}
.msg.sent{align-self:flex-end;align-items:flex-end}
.msg.recv{align-self:flex-start;align-items:flex-start}
.bubble{padding:9px 13px;border-radius:16px;font-size:13.5px;line-height:1.5;word-break:break-word;white-space:pre-wrap}
.msg.sent .bubble{background:var(--sent-bg);color:#c5d2ff;border-bottom-right-radius:3px}
.msg.recv .bubble{background:var(--bg3);border:1px solid var(--border);color:var(--text);border-bottom-left-radius:3px}
.msg-meta{font-size:10.5px;color:var(--text3);margin-top:2px;font-family:var(--mono);padding:0 3px}
.file-link{display:inline-flex;align-items:center;gap:6px;padding:7px 11px;margin-top:5px;background:rgba(79,124,255,.1);border:1px solid rgba(79,124,255,.2);border-radius:8px;font-size:12px;color:var(--accent2);text-decoration:none}

/* ── INPUT AREA ── */
#input-area{padding:10px 22px 12px;border-top:1px solid var(--border);background:var(--bg2);flex-shrink:0}
#blocked-msg{text-align:center;font-size:12px;color:var(--text3);padding:8px;display:none}
#blocked-msg.show{display:block}
#input-area.blocked{opacity:.4;pointer-events:none}
#file-preview{display:none;align-items:center;gap:8px;margin-bottom:8px;padding:7px 12px;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;font-size:12px;color:var(--text2)}
#file-preview.show{display:flex}
#fpname{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#fpremove{background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;line-height:1}
.input-row{display:flex;align-items:flex-end;gap:8px;background:var(--bg3);border:1px solid var(--border2);border-radius:11px;padding:9px 11px;transition:border-color .15s}
.input-row:focus-within{border-color:var(--accent)}
#attach-btn{background:none;border:none;color:var(--text3);cursor:pointer;padding:3px;flex-shrink:0;align-self:flex-end;margin-bottom:1px;transition:color .15s}
#attach-btn:hover{color:var(--accent2)}
#msg-input{flex:1;background:none;border:none;outline:none;color:var(--text);font-size:13.5px;font-family:var(--font);resize:none;min-height:22px;max-height:110px;line-height:1.5}
#msg-input::placeholder{color:var(--text3)}
#send-btn{background:var(--accent);border:none;border-radius:8px;color:#fff;cursor:pointer;padding:6px 14px;font-size:13px;font-family:var(--font);font-weight:500;flex-shrink:0;align-self:flex-end;transition:background .15s;display:flex;align-items:center;gap:5px}
#send-btn:hover{background:#3a66e0}
#send-btn:disabled{opacity:.4;cursor:not-allowed}
#file-input{display:none}

/* ── STATUS BAR — fixed dentro do #main, não sobrepõe input ── */
#status-bar{background:rgba(13,15,20,.95);border-top:1px solid var(--border);padding:4px 18px;font-size:11px;font-family:var(--mono);color:var(--text3);display:flex;align-items:center;gap:8px;flex-shrink:0}
.ws-dot{width:6px;height:6px;border-radius:50%}
.ws-ok{background:var(--green)}
.ws-off{background:var(--red)}

/* ── TOAST ── */
#toast{position:fixed;bottom:28px;right:22px;background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:11px 16px;font-size:13px;z-index:200;transform:translateY(70px);opacity:0;transition:all .22s;max-width:300px}
#toast.show{transform:translateY(0);opacity:1}
#toast.ok{border-color:var(--green2)}
#toast.error{border-color:var(--red)}

/* ── MODAL NOME ── */
#nome-modal{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;display:none;align-items:center;justify-content:center}
#nome-modal.open{display:flex}
.modal-box{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:28px 32px;width:380px;max-width:95vw}
.modal-title{font-size:16px;font-weight:600;margin-bottom:8px}
.modal-desc{font-size:13px;color:var(--text2);margin-bottom:20px;line-height:1.6}
.modal-input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:10px 12px;color:var(--text);font-size:14px;font-family:var(--font);outline:none;margin-bottom:12px;transition:border-color .15s}
.modal-input:focus{border-color:var(--accent)}
.modal-btn{width:100%;background:var(--accent);color:#fff;border:none;border-radius:8px;padding:11px;font-size:14px;font-weight:500;cursor:pointer;font-family:var(--font);transition:background .15s}
.modal-btn:hover{background:#3a66e0}

/* ── MODAL CONTATO ── */
#contato-modal{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;display:none;align-items:center;justify-content:center}
#contato-modal.open{display:flex}
.modal-label{font-size:12px;color:var(--text2);margin-bottom:5px;display:block}
.modal-row{margin-bottom:14px}
.modal-actions{display:flex;gap:8px;margin-top:4px}
.btn-secondary{flex:1;background:none;border:1px solid var(--border2);color:var(--text2);border-radius:8px;padding:10px;font-size:13px;cursor:pointer;font-family:var(--font);transition:all .15s}
.btn-secondary:hover{background:var(--bg3);color:var(--text)}
.btn-primary{flex:2;background:var(--accent);color:#fff;border:none;border-radius:8px;padding:10px;font-size:13px;font-weight:500;cursor:pointer;font-family:var(--font);transition:background .15s}
.btn-primary:hover{background:#3a66e0}
</style>
</head>
<body>

<!-- MODAL NOME -->
<div id="nome-modal" class="open">
  <div class="modal-box">
    <div class="modal-title">👋 Bem-vindo ao Flexo Inbox</div>
    <div class="modal-desc">Digite seu nome para identificar seus atendimentos.</div>
    <input class="modal-input" id="nome-input" placeholder="Seu nome" maxlength="30"
      onkeydown="if(event.key==='Enter')salvarNome()">
    <button class="modal-btn" onclick="salvarNome()">Entrar</button>
  </div>
</div>

<!-- MODAL CONTATO -->
<div id="contato-modal">
  <div class="modal-box">
    <div class="modal-title" id="contato-modal-title">📋 Dados do Contato</div>
    <div class="modal-desc" id="contato-modal-desc">Salve o nome e empresa deste cliente.</div>
    <div class="modal-row">
      <label class="modal-label">Telefone</label>
      <input class="modal-input" id="contato-tel" placeholder="Telefone" readonly style="opacity:.6;cursor:not-allowed">
    </div>
    <div class="modal-row">
      <label class="modal-label">Nome *</label>
      <input class="modal-input" id="contato-nome" placeholder="Nome do cliente" maxlength="80"
        onkeydown="if(event.key==='Enter')salvarContato()">
    </div>
    <div class="modal-row">
      <label class="modal-label">Empresa</label>
      <input class="modal-input" id="contato-empresa" placeholder="Nome da empresa (opcional)" maxlength="120"
        onkeydown="if(event.key==='Enter')salvarContato()">
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="fecharModalContato()">Cancelar</button>
      <button class="btn-primary" onclick="salvarContato()">💾 Salvar contato</button>
    </div>
  </div>
</div>

<div id="sidebar">
  <div id="sidebar-header">
    <div class="brand">
      <div class="brand-logo">FP</div>
      <div>
        <div class="brand-name">Flexo Inbox</div>
        <div class="brand-sub">Atendimento humano</div>
      </div>
    </div>
    <button id="refresh-btn" onclick="loadConversations()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
        <path d="M21 3v5h-5"/>
        <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
        <path d="M3 21v-5h5"/>
      </svg>
      Atualizar
    </button>
  </div>
  <div id="atendente-bar">
    <div id="atendente-badge"></div>
    <span id="atendente-nome">—</span>
    <button id="trocar-btn" onclick="trocarNome()">trocar</button>
  </div>
  <div id="conv-list">
    <div class="empty-msg">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      <p>Carregando...</p>
    </div>
  </div>
</div>

<div id="main">
  <div id="placeholder">
    <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
    </svg>
    <p>Selecione uma conversa</p>
  </div>
  <div id="chat-view">
    <div id="chat-header">
      <div class="client-info">
        <div class="avatar" id="c-avatar">?</div>
        <div>
          <div class="client-name" id="c-name">—</div>
          <div class="client-phone" id="c-phone">—</div>
          <div class="client-empresa" id="c-empresa"></div>
          <div class="client-atend" id="c-atend"></div>
        </div>
      </div>
      <div class="header-actions">
        <button class="btn-contato" onclick="abrirModalContato()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          Editar contato
        </button>
        <button class="btn-finish" id="finish-btn" onclick="finishConv()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
          Finalizar atendimento
        </button>
      </div>
    </div>
    <div id="summary-bar" style="display:none">
      <strong>📋 Resumo:</strong> <span id="summary-text"></span>
    </div>
    <div id="messages"></div>
    <div id="blocked-msg">🔒 Atendido por <strong id="blocked-by"></strong></div>
    <div id="input-area">
      <div id="file-preview">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
        </svg>
        <span id="fpname"></span>
        <button id="fpremove" onclick="removeFile()">✕</button>
      </div>
      <div class="input-row">
        <button id="attach-btn" onclick="document.getElementById('file-input').click()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
          </svg>
        </button>
        <textarea id="msg-input" placeholder="Digite sua mensagem… (Enter para enviar)" rows="1"
          onkeydown="onKey(event)" oninput="autoGrow(this)"></textarea>
        <button id="send-btn" onclick="sendMsg()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
          Enviar
        </button>
      </div>
      <input type="file" id="file-input" onchange="onFileSelect(event)">
    </div>
    <div id="status-bar">
      <span class="ws-dot ws-off" id="ws-dot"></span>
      <span id="ws-label">Conectando...</span>
      <span style="margin-left:auto" id="last-update"></span>
    </div>
  </div>

  <!-- status bar quando não há conversa ativa -->
  <div id="status-bar-idle" style="background:rgba(13,15,20,.95);border-top:1px solid var(--border);padding:4px 18px;font-size:11px;font-family:var(--mono);color:var(--text3);display:flex;align-items:center;gap:8px;flex-shrink:0">
    <span class="ws-dot ws-off" id="ws-dot2"></span>
    <span id="ws-label2">Conectando...</span>
    <span style="margin-left:auto" id="last-update2"></span>
  </div>
</div>

<div id="toast"></div>

<script>
let activeId  = null;
let convs     = [];
let selFile   = null;
let ws        = null;
let unread    = {};
let MEU_NOME  = localStorage.getItem('flexo_atendente') || '';
let activeConvData = null;

// ─── NOME ────────────────────────────────────────────────────────────────────
function salvarNome() {
  const v = document.getElementById('nome-input').value.trim();
  if (!v) { toast('Digite seu nome!', 'error'); return; }
  MEU_NOME = v;
  localStorage.setItem('flexo_atendente', v);
  document.getElementById('nome-modal').classList.remove('open');
  document.getElementById('atendente-nome').textContent = v;
  loadConversations();
  connectWS();
}
function trocarNome() {
  document.getElementById('nome-input').value = MEU_NOME;
  document.getElementById('nome-modal').classList.add('open');
  setTimeout(() => document.getElementById('nome-input').focus(), 100);
}
function initNome() {
  if (MEU_NOME) {
    document.getElementById('nome-modal').classList.remove('open');
    document.getElementById('atendente-nome').textContent = MEU_NOME;
    loadConversations();
    connectWS();
  } else {
    setTimeout(() => document.getElementById('nome-input').focus(), 100);
  }
}

// ─── WEBSOCKET ───────────────────────────────────────────────────────────────
function connectWS() {
  if (ws && ws.readyState === WebSocket.OPEN) return;
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws`);
  ws.onopen = () => {
    setWS(true);
    if (activeId) ws.send(JSON.stringify({ type: 'watch', convId: activeId }));
  };
  ws.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data);
      if (msg.type === 'update' && msg.convId) {
        if (msg.action === 'new_message' && msg.convId === activeId) {
          appendMsgDOM(msg.message);
        } else if (msg.action === 'new_message') {
          unread[msg.convId] = (unread[msg.convId] || 0) + 1;
          loadConversations();
          if (Notification.permission === 'granted') {
            new Notification('Nova mensagem — Flexo Inbox', { body: msg.message?.texto || '' });
          }
        }
        if (msg.action === 'finished' && msg.convId === activeId) {
          resetChat();
          loadConversations();
        }
      }
      if (msg.type === 'new_conv') {
        unread[msg.convId] = (unread[msg.convId] || 0) + 1;
        toast(`🆕 Nova conversa: ${msg.nome || msg.telefone || 'Cliente'}`, 'ok');
        loadConversations();
      }
      if (msg.type === 'conv_updated' && msg.convId !== activeId) loadConversations();
      if (msg.type === 'conv_finished') loadConversations();
    } catch {}
  };
  ws.onclose = () => { setWS(false); setTimeout(connectWS, 3000); };
  ws.onerror = () => { try { ws.close(); } catch {} };
  setInterval(() => {
    if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: 'ping' }));
  }, 25000);
}
function setWS(ok) {
  ['ws-dot','ws-dot2'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.className = `ws-dot ${ok ? 'ws-ok' : 'ws-off'}`;
  });
  const label = ok ? 'Conectado (tempo real)' : 'Reconectando...';
  ['ws-label','ws-label2'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.textContent = label;
  });
}

// ─── CONVERSAS ───────────────────────────────────────────────────────────────
async function loadConversations() {
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('spinning');
  try {
    const res  = await fetch('/api/conversations');
    const body = await res.json();
    let novas = body.data || [];

    if (activeId && !novas.find(c => c.id === activeId)) {
      const ativa = convs.find(c => c.id === activeId);
      if (ativa) novas = [ativa, ...novas];
    }
    if (activeId) {
      const ativaAtual = convs.find(c => c.id === activeId);
      const novaAtiva  = novas.find(c => c.id === activeId);
      if (ativaAtual && novaAtiva) novaAtiva.historico = ativaAtual.historico;
    }

    convs = novas;
    renderSidebar();
    const now = new Date().toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'});
    ['last-update','last-update2'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.textContent = 'às ' + now;
    });
  } catch { toast('Erro ao carregar', 'error'); }
  finally { btn.classList.remove('spinning'); }
}

function fmtTel(t) {
  const d = String(t||'').replace(/\D/g,'');
  if (d.length >= 12) return `+${d.slice(0,2)} (${d.slice(2,4)}) ${d.slice(4,9)}-${d.slice(9)}`;
  if (d.length === 11) return `(${d.slice(0,2)}) ${d.slice(2,7)}-${d.slice(7)}`;
  return t||'';
}

function nomeExibicao(c) {
  return (c.nome && c.nome !== 'Cliente WhatsApp' && c.nome !== 'Cliente')
    ? c.nome : fmtTel(c.telefone);
}

function renderSidebar() {
  const list = document.getElementById('conv-list');
  if (!convs.length) {
    list.innerHTML = `<div class="empty-msg">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg><p>Sem atendimentos pendentes</p></div>`;
    return;
  }
  list.innerHTML = convs.map(c => {
    const isActive  = c.id === activeId;
    const last      = c.historico?.length ? c.historico[c.historico.length - 1] : null;
    const preview   = last ? trunc(last.texto, 45) : 'Sem mensagens';
    const bc        = c.status === 'aguardando' ? 'b-wait' : 'b-active';
    const dc        = c.status === 'aguardando' ? 'dot-wait' : 'dot-active';
    const label     = c.status === 'aguardando' ? 'Aguardando' : 'Em atendimento';
    const locked    = c.atendente && c.atendente !== MEU_NOME;
    const nUnread   = unread[c.id] || 0;
    const hasUnread = nUnread > 0;
    const nome      = nomeExibicao(c);
    const empresa   = c.empresa ? `<div style="font-size:10px;color:var(--accent2);margin-bottom:3px">🏢 ${esc(c.empresa)}</div>` : '';
    const atendInfo = c.atendente ? `<div class="conv-atend">👤 ${esc(c.atendente)}</div>` : '';
    const unreadDot = hasUnread
      ? `<span style="width:8px;height:8px;border-radius:50%;background:var(--accent);display:inline-block;flex-shrink:0;animation:pulse 1.4s ease-in-out infinite"></span>`
      : '';
    return `<div class="conv-item${isActive?' active':''}${locked?' locked':''}${hasUnread?' has-unread':''}" onclick="selectConv('${c.id}')">
      <div class="conv-row1">
        <div style="display:flex;align-items:center;gap:6px;min-width:0">
          ${unreadDot}
          <span class="conv-name${hasUnread?' unread':''}" style="min-width:0">${esc(nome)}</span>
        </div>
        <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
          ${nUnread?`<span class="notif-badge">${nUnread}</span>`:''}
          <span class="conv-time">${fmtTime(c.atualizado_em)}</span>
        </div>
      </div>
      ${empresa}
      <div class="conv-preview${hasUnread?' unread':''}">${esc(preview)}</div>
      ${atendInfo}
      <span class="badge ${bc}"><span class="dot ${dc} dot-pulse"></span>${label}</span>
    </div>`;
  }).join('');
}

// ─── SELECIONAR CONVERSA ─────────────────────────────────────────────────────
async function selectConv(id) {
  const conv = convs.find(c => c.id === id);
  if (!conv) return;
  if (conv.atendente && conv.atendente !== MEU_NOME) {
    toast(`🔒 Conversa com ${conv.atendente}`, 'error'); return;
  }
  activeId = id;
  unread[id] = 0;
  document.getElementById('msg-input').value = '';
  document.getElementById('msg-input').style.height = 'auto';
  removeFile();
  if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: 'watch', convId: id }));
  if (!conv.atendente && MEU_NOME) {
    fetch('/api/set-atendente', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id, atendente: MEU_NOME }),
    }).catch(() => {});
  }
  try {
    const res  = await fetch(`/api/conversations/${id}`);
    const body = await res.json();
    if (!body.data) return;
    const conv = body.data;
    const idx  = convs.findIndex(c => c.id === id);
    if (idx >= 0) convs[idx] = conv;

    // Busca histórico completo (atendimentos anteriores)
    const histRes  = await fetch(`/api/historico/${conv.telefone}`);
    const histBody = await histRes.json();
    const todoAtendimentos = histBody.data || [];

    activeConvData = conv;
    renderSidebar();
    showChat(conv, todoAtendimentos);
  } catch { toast('Erro ao carregar conversa', 'error'); }
}

function showChat(conv, todoAtendimentos) {
  document.getElementById('placeholder').style.display = 'none';
  document.getElementById('status-bar-idle').style.display = 'none';
  document.getElementById('chat-view').style.display = 'flex';

  const nome = nomeExibicao(conv);
  document.getElementById('c-avatar').textContent = nome.charAt(0).toUpperCase();
  document.getElementById('c-name').textContent   = nome;
  document.getElementById('c-phone').textContent  = fmtTel(conv.telefone);

  const empEl = document.getElementById('c-empresa');
  empEl.textContent = conv.empresa ? `🏢 ${conv.empresa}` : '';

  const atEl = document.getElementById('c-atend');
  atEl.textContent = conv.atendente ? `👤 ${conv.atendente}` : '';

  const btn = document.getElementById('finish-btn');
  btn.disabled = false;
  btn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> Finalizar atendimento`;

  const sb = document.getElementById('summary-bar');
  if (conv.resumo_ia) {
    sb.style.display = 'block';
    document.getElementById('summary-text').textContent = conv.resumo_ia;
  } else { sb.style.display = 'none'; }

  const locked = conv.atendente && conv.atendente !== MEU_NOME;
  document.getElementById('input-area').classList.toggle('blocked', locked);
  const bm = document.getElementById('blocked-msg');
  if (locked) { bm.classList.add('show'); document.getElementById('blocked-by').textContent = conv.atendente; }
  else { bm.classList.remove('show'); }

  // Renderiza histórico completo com separadores de sessão
  renderMessagesCompleto(todoAtendimentos, conv.id);
}

function resetChat() {
  activeId = null;
  activeConvData = null;
  document.getElementById('chat-view').style.display = 'none';
  document.getElementById('placeholder').style.display = 'flex';
  document.getElementById('status-bar-idle').style.display = 'flex';
  document.getElementById('msg-input').value = '';
  document.getElementById('msg-input').style.height = 'auto';
  removeFile();
}

// Renderiza todos os atendimentos anteriores + atual com separadores
function renderMessagesCompleto(atendimentos, atualId) {
  const box = document.getElementById('messages');
  box.innerHTML = '';

  atendimentos.forEach((at, idx) => {
    const isAtual = at.id === atualId;
    const historico = Array.isArray(at.historico) ? at.historico : [];

    if (idx > 0 || (!isAtual && historico.length > 0)) {
      const divider = document.createElement('div');
      divider.className = 'session-divider';
      const dataStr = at.criado_em
        ? new Date(at.criado_em).toLocaleDateString('pt-BR', {day:'2-digit',month:'2-digit',year:'numeric'})
        : `Sessão ${idx + 1}`;
      const label = isAtual ? 'Conversa atual' : `Atendimento ${at.numero_atendimento || idx + 1} · ${dataStr}`;
      divider.innerHTML = `<span>${label}</span>`;
      box.appendChild(divider);
    }

    historico.forEach(m => {
      const div = document.createElement('div');
      div.innerHTML = msgHTML(m);
      box.appendChild(div.firstChild);
    });
  });

  box.scrollTop = box.scrollHeight;
}

function renderMessages(historico) {
  const box = document.getElementById('messages');
  box.innerHTML = historico.map(m => msgHTML(m)).join('');
  box.scrollTop = box.scrollHeight;
}

function msgHTML(m) {
  const isSent = m.de === 'humano' || m.de === 'atendente';
  const cls    = isSent ? 'sent' : 'recv';
  const quem   = isSent ? (m.atendente || MEU_NOME || 'Você') : 'Cliente';
  const hora   = m.hora || '';
  let fileHtml = '';
  if (m.arquivo) {
    fileHtml = `<a class="file-link" href="${m.arquivo.url||'#'}" target="_blank">📎 ${esc(m.arquivo.nome||'Arquivo')}</a>`;
  }
  return `<div class="msg ${cls}">
    <div class="bubble">${esc(m.texto)}${fileHtml}</div>
    <div class="msg-meta">${quem}${hora?' · '+hora:''}</div>
  </div>`;
}

function appendMsgDOM(m) {
  const box = document.getElementById('messages');
  const last = box.lastElementChild;
  if (last) {
    const lastTexto = last.querySelector('.bubble')?.textContent?.trim();
    const lastMeta  = last.querySelector('.msg-meta')?.textContent?.trim();
    const mQuem = (m.de === 'humano' || m.de === 'atendente') ? (m.atendente || MEU_NOME || 'Você') : 'Cliente';
    if (lastTexto === (m.texto||'').trim() && lastMeta?.includes(mQuem)) return;
  }
  const div = document.createElement('div');
  div.innerHTML = msgHTML(m);
  box.appendChild(div.firstChild);
  box.scrollTop = box.scrollHeight;
  const conv = convs.find(c => c.id === activeId);
  if (conv) { conv.historico = conv.historico || []; conv.historico.push(m); renderSidebar(); }
}

// ─── CONTATO ─────────────────────────────────────────────────────────────────
function abrirModalContato() {
  if (!activeConvData) return;
  document.getElementById('contato-tel').value     = fmtTel(activeConvData.telefone);
  document.getElementById('contato-nome').value    = (activeConvData.nome === 'Cliente WhatsApp' || activeConvData.nome === 'Cliente') ? '' : (activeConvData.nome || '');
  document.getElementById('contato-empresa').value = activeConvData.empresa || '';
  document.getElementById('contato-modal').classList.add('open');
  setTimeout(() => document.getElementById('contato-nome').focus(), 100);
}

function fecharModalContato() {
  document.getElementById('contato-modal').classList.remove('open');
}

async function salvarContato() {
  if (!activeConvData) return;
  const nome    = document.getElementById('contato-nome').value.trim();
  const empresa = document.getElementById('contato-empresa').value.trim();
  if (!nome) { toast('Digite o nome do cliente!', 'error'); return; }

  try {
    const tel = String(activeConvData.telefone).replace(/\D/g, '');
    const res  = await fetch(`/api/contatos/${tel}`, {
      method:  'PUT',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ nome, empresa }),
    });
    const body = await res.json();
    if (!body.ok) throw new Error(body.error || 'Erro');

    // Atualiza dados locais
    activeConvData.nome    = nome;
    activeConvData.empresa = empresa;
    const idx = convs.findIndex(c => c.id === activeId);
    if (idx >= 0) { convs[idx].nome = nome; convs[idx].empresa = empresa; }

    // Atualiza header
    document.getElementById('c-name').textContent = nome;
    document.getElementById('c-avatar').textContent = nome.charAt(0).toUpperCase();
    document.getElementById('c-empresa').textContent = empresa ? `🏢 ${empresa}` : '';

    renderSidebar();
    fecharModalContato();
    toast('✅ Contato salvo!', 'ok');
  } catch (e) {
    toast('Erro ao salvar: ' + e.message, 'error');
  }
}

// ─── ENVIAR ──────────────────────────────────────────────────────────────────
async function sendMsg() {
  if (!activeId) return;
  const input = document.getElementById('msg-input');
  const texto = input.value.trim();
  if (!texto && !selFile) return;
  const btn = document.getElementById('send-btn');
  btn.disabled = true;
  input.value = '';
  input.style.height = 'auto';
  try {
    let res;
    if (selFile) {
      const form = new FormData();
      form.append('id', activeId);
      form.append('file', selFile);
      if (texto) form.append('caption', texto);
      form.append('atendente', MEU_NOME);
      res = await fetch('/api/send-file', { method: 'POST', body: form });
    } else {
      res = await fetch('/api/send', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: activeId, texto, atendente: MEU_NOME }),
      });
    }
    const body = await res.json();
    if (!body.ok) throw new Error(body.error || 'Erro');
    removeFile();
  } catch (e) {
    toast('Erro ao enviar: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
    input.focus();
  }
}

// ─── FINALIZAR ───────────────────────────────────────────────────────────────
async function finishConv() {
  if (!activeId) return;
  const conv = convs.find(c => c.id === activeId);
  const nome = nomeExibicao(conv);
  if (!confirm(`Finalizar atendimento de ${nome}?\nA IA voltará a responder este número.`)) return;

  const idParaFinalizar = activeId;
  toast('✅ Atendimento finalizado! IA liberada.', 'ok');
  resetChat();
  convs = convs.filter(c => c.id !== idParaFinalizar);
  renderSidebar();

  fetch('/api/finish', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ id: idParaFinalizar }),
  }).catch(() => {});

  setTimeout(loadConversations, 2000);
}

// ─── ARQUIVO ─────────────────────────────────────────────────────────────────
function onFileSelect(e) {
  selFile = e.target.files[0];
  if (!selFile) return;
  document.getElementById('fpname').textContent = selFile.name;
  document.getElementById('file-preview').classList.add('show');
}
function removeFile() {
  selFile = null;
  document.getElementById('file-input').value = '';
  document.getElementById('file-preview').classList.remove('show');
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function onKey(e) { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();} }
function autoGrow(el) { el.style.height='auto';el.style.height=Math.min(el.scrollHeight,110)+'px'; }
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function trunc(s,n) { return (s||'').length>n?s.slice(0,n)+'…':(s||''); }
function fmtTime(iso) {
  if(!iso) return '';
  try {
    const d=new Date(iso),now=new Date();
    if(d.toDateString()===now.toDateString()) return d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});
  } catch { return ''; }
}
function toast(msg,type='') {
  const el=document.getElementById('toast');
  el.textContent=msg;el.className=`show ${type}`;
  clearTimeout(el._t);el._t=setTimeout(()=>{el.className='';},3500);
}

// ─── INIT ────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded',()=>{
  initNome();
  setInterval(loadConversations, 15000);
  if('Notification'in window&&Notification.permission==='default') Notification.requestPermission();
});
</script>
