<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flux2Up — Histórico Humano</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080a10;--bg2:#0e1018;--bg3:#141720;--border:#1e2130;--border2:#272b3d;
  --text:#e8eaf2;--text2:#8b90aa;--text3:#4a5068;
  --purple:#7c3aed;--purple2:#9d5cf6;--purple3:#c084fc;
  --blue:#3b82f6;--blue2:#60a5fa;--green:#22c55e;--amber:#f59e0b;--red:#ef4444;
  --sent-bg:rgba(59,130,246,.28);
  --font:'DM Sans',sans-serif;--display:'Syne',sans-serif;--mono:'DM Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--font)}
body{padding-bottom:40px}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 85% 30%,rgba(59,130,246,.07) 0%,transparent 70%),radial-gradient(ellipse 40% 60% at 15% 70%,rgba(124,58,237,.05) 0%,transparent 70%);pointer-events:none;z-index:0}

.page-header{background:var(--bg2);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:10;backdrop-filter:blur(10px)}
.page-header img{height:30px;object-fit:contain;filter:drop-shadow(0 0 8px rgba(59,130,246,.4))}
.header-title{font-family:var(--display);font-size:14px;font-weight:700}
.header-badge{font-size:11px;background:rgba(59,130,246,.15);color:var(--blue2);padding:2px 8px;border-radius:20px;font-family:var(--mono);margin-left:8px}
.header-phone{font-size:11px;color:var(--text2);font-family:var(--mono);margin-top:2px}

.container{max-width:720px;margin:0 auto;padding:20px 16px;position:relative;z-index:1}

.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px 16px}
.stat-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
.stat-value{font-size:20px;font-weight:700;font-family:var(--display)}
.c-blue{color:var(--blue2)}
.c-purple{color:var(--purple3)}
.c-green{color:var(--green)}
.c-amber{color:var(--amber);font-size:13px;margin-top:4px}

.day-divider{display:flex;align-items:center;gap:10px;margin:16px 0 10px}
.day-divider span{font-size:10px;color:var(--text3);white-space:nowrap;font-family:var(--mono);text-transform:uppercase;letter-spacing:.04em}
.day-divider::before,.day-divider::after{content:'';flex:1;height:1px;background:var(--border)}

.session{background:var(--bg2);border:1px solid var(--border);border-radius:14px;margin-bottom:12px;overflow:hidden}
.session-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:rgba(59,130,246,.04)}
.session-info{font-size:11px;color:var(--text2);font-family:var(--mono)}
.session-atend{font-size:11px;color:var(--blue2);margin-top:2px}
.session-tag{font-size:10px;padding:2px 8px;border-radius:20px;font-family:var(--mono)}
.tag-sem{background:rgba(74,80,104,.2);color:var(--text3)}
.tag-ok{background:rgba(34,197,94,.12);color:var(--green)}
.tag-perdido{background:rgba(239,68,68,.12);color:var(--red)}
.tag-aguardando{background:rgba(245,158,11,.12);color:var(--amber)}

.messages{padding:14px 16px;display:flex;flex-direction:column;gap:8px}
.msg{display:flex;flex-direction:column}
.msg.cliente{align-items:flex-start}
.msg.humano{align-items:flex-end}
.msg-who{font-size:10px;color:var(--text3);font-family:var(--mono);margin-bottom:2px}
.bubble{padding:8px 13px;border-radius:13px;font-size:13px;line-height:1.55;word-break:break-word;max-width:78%}
.msg.cliente .bubble{background:var(--bg3);border:1px solid var(--border);color:var(--text);border-bottom-left-radius:3px}
.msg.humano .bubble{background:linear-gradient(135deg,rgba(59,130,246,.3),rgba(37,99,235,.25));color:#bfdbfe;border:1px solid rgba(59,130,246,.2);border-bottom-right-radius:3px}
.msg-time{font-size:10px;color:var(--text3);font-family:var(--mono);margin-top:2px}

.center{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:260px;gap:12px;color:var(--text3);text-align:center}
.spinner{width:28px;height:28px;border:3px solid var(--border2);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:580px){
  .stats{grid-template-columns:repeat(2,1fr)}
  .bubble{max-width:90%}
}
</style>
</head>
<body>

<div class="page-header">
  <img src="/Logo_Flux_2_Up_semfundo.png" alt="Flux2Up">
  <div>
    <div><span class="header-title">Histórico Humano</span><span class="header-badge">👤 Atendente</span></div>
    <div class="header-phone" id="header-phone">Carregando...</div>
  </div>
</div>

<div class="container">
  <div class="stats" id="stats" style="display:none">
    <div class="stat-card"><div class="stat-label">Atendimentos</div><div class="stat-value c-blue" id="s-atend">0</div></div>
    <div class="stat-card"><div class="stat-label">Mensagens</div><div class="stat-value c-purple" id="s-msgs">0</div></div>
    <div class="stat-card"><div class="stat-label">Atendentes</div><div class="stat-value c-green" id="s-ats">0</div></div>
    <div class="stat-card"><div class="stat-label">1º contato</div><div class="stat-value c-amber" id="s-data">—</div></div>
  </div>
  <div id="content"><div class="center"><div class="spinner"></div><p>Carregando histórico...</p></div></div>
</div>

<script>
function getParam(n){return new URLSearchParams(window.location.search).get(n)||'';}
function fmtTel(t){const d=String(t||'').replace(/\D/g,'');if(d.length>=12)return`+${d.slice(0,2)} (${d.slice(2,4)}) ${d.slice(4,9)}-${d.slice(9)}`;return t||'';}
function fmtData(iso){if(!iso)return'—';try{return new Date(iso).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'});}catch{return iso;}}
function fmtHora(iso){if(!iso)return'';try{return new Date(iso).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});}catch{return '';}}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function tagInfo(tag) {
  if (!tag) return {cls:'tag-sem',label:'Sem classificação'};
  if (tag.includes('CONFIRMADO')||tag.includes('FECHADO')) return {cls:'tag-ok',label:tag};
  if (tag.includes('PERDIDO')) return {cls:'tag-perdido',label:tag};
  if (tag.includes('AGUARDANDO')||tag.includes('RETORNO')) return {cls:'tag-aguardando',label:tag};
  return {cls:'tag-sem',label:tag};
}

async function init() {
  const tel = getParam('telefone').replace(/\D/g,'');
  if (!tel) { document.getElementById('content').innerHTML='<div class="center"><p>Informe ?telefone=5541999999999 na URL</p></div>'; return; }
  document.getElementById('header-phone').textContent = fmtTel(tel);

  try {
    const res  = await fetch(`/api/historico/${tel}`);
    const body = await res.json();
    if (!body.ok) throw new Error(body.error);

    const atendimentos = (body.data || []).filter(a => a.historico?.length > 0);

    if (!atendimentos.length) {
      document.getElementById('content').innerHTML='<div class="center"><p>Nenhum atendimento humano encontrado.</p></div>';
      return;
    }

    // Stats
    const todasMsgs = atendimentos.reduce((acc,a)=>acc+(a.historico?.length||0),0);
    const atendentes = [...new Set(atendimentos.map(a=>a.atendente).filter(Boolean))];
    const primeiro = atendimentos[0]?.criado_em||'';

    document.getElementById('stats').style.display='grid';
    document.getElementById('s-atend').textContent=atendimentos.length;
    document.getElementById('s-msgs').textContent=todasMsgs;
    document.getElementById('s-ats').textContent=atendentes.length;
    document.getElementById('s-data').textContent=fmtData(primeiro);

    let html='', lastDay='';
    atendimentos.forEach((at, idx) => {
      const historico = Array.isArray(at.historico)?at.historico:[];
      const day = fmtData(at.criado_em||'');
      const hora = fmtHora(at.criado_em||'');
      const ti = tagInfo(at.tag_gerada||'');

      if (day!==lastDay) { html+=`<div class="day-divider"><span>${day}</span></div>`; lastDay=day; }

      html+=`<div class="session">
        <div class="session-header">
          <div>
            <div class="session-info">🕐 ${hora} · Atendimento ${at.numero_atendimento||idx+1} · ${historico.length} mensagem(ns)</div>
            ${at.atendente?`<div class="session-atend">👤 ${esc(at.atendente)}</div>`:''}
          </div>
          <span class="session-tag ${ti.cls}">${ti.label}</span>
        </div>
        <div class="messages">`;

      historico.forEach(m => {
        const isSent = m.de==='humano'||m.de==='atendente';
        const cls = isSent?'humano':'cliente';
        const who = isSent?(m.atendente||at.atendente||'Atendente'):'Cliente';
        const h = m.hora||'';
        html+=`<div class="msg ${cls}">
          <div class="msg-who">${esc(who)}</div>
          <div class="bubble">${esc(m.texto||'')}</div>
          ${h?`<div class="msg-time">${h}</div>`:''}
        </div>`;
      });

      html+=`</div></div>`;
    });

    document.getElementById('content').innerHTML=html;
  } catch(e) {
    document.getElementById('content').innerHTML=`<div class="center"><p>Erro: ${e.message}</p></div>`;
  }
}
init();
</script>
</body>
</html>
