<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flux2Up — Histórico IA</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
/* (SEU CSS ORIGINAL MANTIDO INTEGRALMENTE) */
:root{
  --bg:#080a10;--bg2:#0e1018;--bg3:#141720;--border:#1e2130;--border2:#272b3d;
  --text:#e8eaf2;--text2:#8b90aa;--text3:#4a5068;
  --purple:#7c3aed;--purple2:#9d5cf6;--purple3:#c084fc;
  --blue:#3b82f6;--blue2:#60a5fa;--green:#22c55e;--amber:#f59e0b;--red:#ef4444;
  --font:'DM Sans',sans-serif;--display:'Syne',sans-serif;--mono:'DM Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--font)}
body{padding-bottom:40px}

.container{max-width:720px;margin:0 auto;padding:20px 16px}

.msg{display:flex;flex-direction:column}
.msg.cliente{align-items:flex-start}
.msg.ia{align-items:flex-end}

.bubble{padding:8px 13px;border-radius:13px;font-size:13px;max-width:78%}
.msg.cliente .bubble{background:#222}
.msg.ia .bubble{background:#5b21b6}

.msg-time{font-size:10px;color:#aaa;margin-top:2px}
</style>
</head>

<body>

<div class="container">
  <div id="content">Carregando...</div>
</div>

<script>
function fmtHora(iso){
  if(!iso)return'';
  try{return new Date(iso).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});}catch{return'';}
}

function esc(s){
  return (s||'')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;');
}

async function init(){

  const tel = new URLSearchParams(location.search).get('telefone');

  if(!tel){
    document.getElementById('content').innerHTML='Informe telefone na URL';
    return;
  }

  const res = await fetch(`/api/historico-ia/${tel}`);
  const body = await res.json();

  if(!body.ok){
    document.getElementById('content').innerHTML=body.error;
    return;
  }

  const { conversas } = body.data;

  let html='';

  conversas.forEach(r=>{

    const hora = fmtHora(r.data_hora);

    // 🔥 PRINCIPAL: usa historico_json
    if(r.historico_json){

      const linhas = String(r.historico_json)
        .split('\n')
        .map(x=>x.trim())
        .filter(Boolean);

      linhas.forEach(linha=>{

        if(linha.startsWith('Cliente:')){
          const txt = linha.replace(/^Cliente:\s*/,'').trim();

          if(txt){
            html+=`
              <div class="msg cliente">
                <div class="bubble">${esc(txt)}</div>
                ${hora?`<div class="msg-time">${hora}</div>`:''}
              </div>`;
          }
        }

        else if(
          linha.startsWith('Lucas:') ||
          linha.startsWith('IA:') ||
          linha.startsWith('Flexo PRO IA:')
        ){
          const txt = linha
            .replace(/^Lucas:\s*/,'')
            .replace(/^IA:\s*/,'')
            .replace(/^Flexo PRO IA:\s*/,'')
            .replace(/\[.*?\]/g,'')
            .trim();

          if(txt){
            html+=`
              <div class="msg ia">
                <div class="bubble">${esc(txt)}</div>
                ${hora?`<div class="msg-time">${hora}</div>`:''}
              </div>`;
          }
        }

      });
    }

    // fallback antigo
    else{
      if(r.mensagem_cliente){
        html+=`
          <div class="msg cliente">
            <div class="bubble">${esc(r.mensagem_cliente)}</div>
            ${hora?`<div class="msg-time">${hora}</div>`:''}
          </div>`;
      }

      if(r.resposta_lucas){
        html+=`
          <div class="msg ia">
            <div class="bubble">${esc(r.resposta_lucas)}</div>
            ${hora?`<div class="msg-time">${hora}</div>`:''}
          </div>`;
      }
    }

  });

  document.getElementById('content').innerHTML = html || 'Sem mensagens';

}

init();
</script>

</body>
</html>
